<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — UNCOUNTED</title>
<meta name="description" content="Uncounted {{TITLE}}. {{VERSION_LINE}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #06081a;
  --bg-primary: #0a0e27;
  --bg-card: #ffffff;
  --purple-core: #7c6cf0;
  --purple-light: #a78bfa;
  --border: rgba(124,108,240,0.12);
  --border-strong: rgba(124,108,240,0.25);
  --text-on-dark: #e8e6f0;
  --text-dim: #8b87a8;
  --text-body: #1a1a2e;
  --text-body-sub: #4a4a6a;
  --text-body-tertiary: #7a7a90;
  --row-zebra: #f7f6fb;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-on-dark);
  line-height: 1.7;
  min-height: 100vh;
}
.topbar {
  padding: 16px 20px;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-inner {
  max-width: 820px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: #fff;
  text-decoration: none;
  letter-spacing: 0.02em;
}
.logo span { color: var(--purple-core); }
.topbar-link {
  font-size: 12px;
  color: var(--text-dim);
  text-decoration: none;
  white-space: nowrap;
}
.topbar-link:hover { color: var(--purple-light); }

.page-wrap {
  max-width: 820px;
  margin: 0 auto;
  padding: 32px 20px 64px;
}
.page-header {
  margin-bottom: 24px;
  text-align: center;
}
.page-header h1 {
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  line-height: 1.3;
  margin-bottom: 10px;
}
.page-header .meta {
  display: inline-block;
  font-size: 12px;
  color: var(--purple-light);
  padding: 4px 12px;
  background: rgba(124,108,240,0.12);
  border: 1px solid var(--border-strong);
  border-radius: 999px;
}

.content-card {
  background: var(--bg-card);
  color: var(--text-body);
  border-radius: 16px;
  padding: 40px 36px;
  box-shadow: 0 24px 64px rgba(6,8,26,0.4);
}
.content-card h1 { display: none; }
.content-card h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-body);
  margin-top: 32px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--purple-core);
}
.content-card h2:first-child { margin-top: 0; }
.content-card h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-body);
  margin-top: 24px;
  margin-bottom: 10px;
}
.content-card h4 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-body-sub);
  margin-top: 20px;
  margin-bottom: 8px;
}
.content-card p {
  font-size: 14px;
  color: var(--text-body-sub);
  margin-bottom: 12px;
  line-height: 1.8;
}
.content-card ul, .content-card ol {
  font-size: 14px;
  color: var(--text-body-sub);
  margin-bottom: 12px;
  padding-left: 24px;
  line-height: 1.8;
}
.content-card li { margin-bottom: 6px; }
.content-card li > ul, .content-card li > ol { margin-top: 6px; margin-bottom: 6px; }
.content-card strong { color: var(--text-body); font-weight: 700; }
.content-card a { color: var(--purple-core); text-decoration: underline; text-underline-offset: 2px; }
.content-card a:hover { color: var(--purple-light); }
.content-card hr {
  border: 0;
  border-top: 1px solid #e5e3ee;
  margin: 32px 0;
}
.content-card blockquote {
  background: #f7f6fb;
  border-left: 3px solid var(--purple-core);
  padding: 12px 16px;
  margin: 16px 0;
  font-size: 13px;
  color: var(--text-body-sub);
  border-radius: 0 8px 8px 0;
}
.content-card blockquote p { margin-bottom: 6px; font-size: 13px; }
.content-card blockquote p:last-child { margin-bottom: 0; }
.content-card code {
  background: #ecebf3;
  color: var(--text-body);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: 'Space Grotesk', monospace;
  font-size: 13px;
}
.content-card table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 13px;
}
.content-card thead th {
  background: var(--purple-core);
  color: #fff;
  font-weight: 700;
  text-align: left;
  padding: 10px 12px;
}
.content-card tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid #e5e3ee;
  color: var(--text-body-sub);
  vertical-align: top;
}
.content-card tbody tr:nth-child(even) td { background: var(--row-zebra); }
.content-card tbody tr:last-child td { border-bottom: 0; }

.footer {
  max-width: 820px;
  margin: 32px auto 0;
  padding: 24px 20px;
  text-align: center;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.8;
}
.footer-links { margin-bottom: 8px; }
.footer-links a {
  color: var(--purple-light);
  text-decoration: none;
  margin: 0 8px;
}
.footer-links a:hover { text-decoration: underline; }
.footer-meta { font-size: 11px; color: var(--text-dim); }

@media (max-width: 600px) {
  .page-header h1 { font-size: 22px; }
  .content-card { padding: 24px 18px; }
  .content-card h2 { font-size: 17px; }
  .content-card h3 { font-size: 15px; }
  .content-card p, .content-card ul, .content-card ol { font-size: 13px; }
  .content-card table { font-size: 12px; }
  .content-card thead th, .content-card tbody td { padding: 8px 10px; }
}
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-inner">
    <a href="/" class="logo">UN<span>COUNTED</span></a>
    <a href="/" class="topbar-link">메인 사이트 &rarr;</a>
  </div>
</nav>

<main class="page-wrap">
  <div class="page-header">
    <h1>{{TITLE}}</h1>
    <span class="meta">{{VERSION_LINE}}</span>
  </div>

  <article class="content-card">
{{CONTENT}}
  </article>
</main>

<footer class="footer">
  <div class="footer-links">
    <a href="/legal/terms.html">이용약관</a> &middot;
    <a href="/legal/privacy.html">개인정보처리방침</a> &middot;
    <a href="mailto:admin@uncounted.cloud">문의: admin@uncounted.cloud</a>
  </div>
  <div class="footer-meta">
    개인정보 보호책임자: privacy@uncounted.app &middot; &copy; UNCOUNTED
  </div>
</footer>

</body>
</html>
